name: 🪲 Bug Report
description: Report a bug or problem with the application.
title: "[BUG]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Please fill out the form below to help us understand the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear and concise description of the bug
      placeholder: What is the bug about?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: Expected behavior description
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
      placeholder: Actual behavior description
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, version, or other relevant environment details
      placeholder: e.g., Ubuntu 22.04.5, Google Chrome Version 145.0.7632.117 (Official Build) (64-bit)
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Any relevant error messages or logs
      render: shell
    validations:
      required: false
