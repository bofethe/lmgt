<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Let Me Get That</title>
  <meta name="description" content="Track what you've lent — tools, gear, anything — and send automated return reminders.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Styles (order matters: tokens → base → layout → components) -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

<!-- ══════════════════════════════════════════
     AUTH WALL — shown when logged out
     ══════════════════════════════════════════ -->
<div id="auth-wall" style="display:none;">
  <div class="auth-card">

    <div class="auth-logo">Let Me <span>Get That</span></div>
    <div class="auth-sub">Lending tracker · Sign in to continue</div>

    <div class="auth-tabs">
      <button id="tab-login"  class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
      <button id="tab-signup" class="auth-tab"        onclick="switchAuthTab('signup')">Create Account</button>
    </div>

    <div class="form-group" style="margin-bottom:14px;">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="form-group" style="margin-bottom:14px;">
      <label>Password</label>
      <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <!-- Only visible on signup -->
    <div class="form-group" id="auth-confirm-wrap" style="display:none; margin-bottom:14px;">
      <label>Confirm Password</label>
      <input type="password" id="auth-confirm" placeholder="••••••••" autocomplete="new-password">
    </div>

    <div class="auth-error" id="auth-error"></div>

    <button id="auth-submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px;"
            onclick="handleAuthSubmit()">
      Sign In
    </button>

    <!-- Forgot password — only shown on login tab -->
    <div id="forgot-wrap" style="text-align:center; margin-top:14px;">
      <button class="forgot-link" onclick="handleForgotPassword()">Forgot password?</button>
    </div>

  </div>
</div>


<!-- ══════════════════════════════════════════
     MAIN APP — shown when logged in
     ══════════════════════════════════════════ -->
<div id="main-app" style="display:none;">
<div class="app-shell">

  <!-- Header -->
  <header>
    <div>
      <div class="wordmark">Let Me <span>Get That</span></div>
      <div class="header-sub">Lending Tracker</div>
    </div>
    <div class="header-right">
      <button class="btn btn-primary" onclick="openAddModal()">+ New Record</button>
      <div class="user-menu">
        <button class="user-btn" onclick="toggleUserMenu()">
          <div class="user-avatar" id="user-avatar-initials">??</div>
          <span>Account ▾</span>
        </button>
        <div class="user-dropdown" id="user-dropdown">
          <div class="dropdown-email" id="user-email-display"></div>
          <button class="dropdown-item danger" onclick="event.stopPropagation(); handleSignOut()">Sign Out</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Alert Banner -->
  <div id="alert-banner"></div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="stat-active">—</div>
      <div class="stat-label">Active Lendings</div>
    </div>
    <div class="stat-card">
      <div class="stat-num warning" id="stat-upcoming">—</div>
      <div class="stat-label">Due in 24h</div>
    </div>
    <div class="stat-card">
      <div class="stat-num danger" id="stat-overdue">—</div>
      <div class="stat-label">Overdue</div>
    </div>
  </div>

  <!-- Records -->
  <div class="section-header">
    <span class="section-title">Lending Records</span>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('upcoming', this)">Due Soon</button>
    <button class="filter-btn" onclick="setFilter('overdue', this)">Overdue</button>
    <button class="filter-btn" onclick="setFilter('returned', this)">Returned</button>
  </div>

  <div id="records-list" class="records-list"></div>

</div><!-- /.app-shell -->
</div><!-- /#main-app -->


<!-- ══════════════════════════════════════════
     MODAL — Add / Edit Record
     ══════════════════════════════════════════ -->
<div class="modal-overlay" id="record-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">New Lending Record</div>
      <button class="modal-close" onclick="closeRecordModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Lender Name *</label>
          <input type="text" id="f-lender" placeholder="Your name">
        </div>
        <div class="form-group">
          <label>Recipient Name *</label>
          <input type="text" id="f-recipient" placeholder="Borrower's name">
        </div>
        <div class="form-group full">
          <label>Item Being Lent *</label>
          <input type="text" id="f-item" placeholder="e.g. DeWalt Drill, pressure washer, camera…">
        </div>
        <div class="form-group">
          <label>Date Borrowed *</label>
          <input type="date" id="f-borrowed">
        </div>
        <div class="form-group">
          <label>Anticipated Return Date *</label>
          <input type="date" id="f-due">
        </div>
        <div class="form-group full">
          <label>Recipient Email *</label>
          <input type="email" id="f-email" placeholder="borrower@email.com">
        </div>
        <div class="form-group full">
          <label>Notes (optional)</label>
          <input type="text" id="f-notes" placeholder="Condition, accessories included, etc.">
        </div>
      </div>
      <div class="form-footer">
        <button class="btn btn-ghost" onclick="closeRecordModal()">Cancel</button>
        <button class="btn btn-primary" id="save-record-btn" onclick="handleSaveRecord()">Save Record</button>
      </div>
    </div>
  </div>
</div>


<!-- ══════════════════════════════════════════
     MODAL — Mark Returned
     ══════════════════════════════════════════ -->
<div class="modal-overlay" id="return-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Mark as Returned</div>
      <button class="modal-close" onclick="closeReturnModal()">&times;</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--muted);font-size:0.88rem;margin-bottom:20px;">
        Recording the actual return date stops all future reminders for this item.
      </p>
      <div class="form-group">
        <label>Actual Return Date</label>
        <input type="date" id="f-return-date">
      </div>
      <div class="form-footer">
        <button class="btn btn-ghost" onclick="closeReturnModal()">Cancel</button>
        <button class="btn btn-ok" id="confirm-return-btn" onclick="handleConfirmReturn()">Confirm Return</button>
      </div>
    </div>
  </div>
</div>


<!-- Toast -->
<div id="toast"></div>


<!-- ══════════════════════════════════════════
     SCRIPTS (order matters)
     ══════════════════════════════════════════ -->
<script src="js/utils.js"></script>
<script src="js/supabase.js"></script>
<script src="js/email.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
